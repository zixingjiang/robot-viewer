[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "linux-aarch64", "osx-64", "win-64"]

[dependencies]
python = "==3.13"
qpsolvers = ">=4.10.0,<5"
pink = ">=4.1.0,<5"
robot_descriptions = ">=1.23.0,<2"

[pypi-dependencies]
tyro = ">=1.0.9,<2"
viser = ">=1.0.24,<2"
xacrodoc = ">=2.0.0,<3"
yourdfpy = ">=0.0.60,<0.1"

[feature.mjcf.dependencies]
mujoco = ">=3.2.7,<4"

[feature.mjcf.pypi-dependencies]
mink = ">=1.1.0,<2"
trimesh = ">=4.0,<5"

[tasks]
rv = { cmd = "python -m robot_viewer.cli", env = { PYTHONPATH = "src" } }
